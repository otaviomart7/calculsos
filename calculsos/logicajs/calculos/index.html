<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculos</title>
</head>
<body>
    <h1>Cálculos</h1>

    <h2>Adição:</h2>
    <label for="n1">Digite um number</label>
    <input type="number" id="n1">
    <label for="n2">Digite um outro number</label>
    <input type="number" id="n2">
    <button onclick="somar()">Somar</button>
    <p id="resposta_adicao"></p>


    <h2>Subtração:</h2>
    <label for="n3">Digite um número</label>
    <input type="number" id="n3">
    <label for="n4">Digite um número</label>
    <input type="number" id="n4">
    <button onclick="subtrair()">Subtrair</button>
    <p id="resposta_subtracao"></p>


    <h2>Divisão:</h2>
    <label for="n5">Digite um número</label>
    <input type="number" id="n5">
    <label for="n6">Digite um número</label>
    <input type="number" id="n6">
    <button onclick="dividir()">Dividir</button>
    <p id="resposta_divisao"></p>



    <script src="script.js"></script>
</body>
</html>
